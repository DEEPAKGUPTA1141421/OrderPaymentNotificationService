spring.application.name=OrderPaymentNotificationService
server.port=8082

# ========= Database =========
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
feign.client.productclient.url=http://localhost:8081
# ========= JPA =========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========= Redis =========
spring.data.redis.host=192.168.1.113
spring.data.redis.port=6379
spring.data.redis.client-type=lettuce

# ========= Twilio =========
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

# ========= SendGrid =========
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL}

# ========= Kafka =========
# Broker address is configured in application.yml (spring.kafka.bootstrap-servers)

# ========= Google API =========
google.api.key=${GOOGLE_API_KEY}

# ========= Elasticsearch =========
elasticsearch.url=${ELASTICSEARCH_URL}
elasticsearch.username=${ELASTICSEARCH_USERNAME}
elasticsearch.api.key=${ELASTICSEARCH_API_KEY}

# ========= JWT =========
jwt.private.key.path=classpath:keys/private_key.pem
jwt.public.key.path=classpath:keys/public_key.pem
jwt.expiration.in.millis=86400000


# ========= AWS S3 =========
aws.access.key=${AWS_ACCESS_KEY}
aws.secret.key=${AWS_SECRET_KEY}
aws.region=${AWS_REGION}
aws.s3.bucket=${AWS_S3_BUCKET}

# ========= Cloudinary =========
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api.key=${CLOUDINARY_API_KEY}
cloudinary.api.secret=${CLOUDINARY_API_SECRET}

# ========= Others =========
spring.cloud.compatibility-verifier.enabled=false
server.error.include-stacktrace=never
server.error.include-message=never


# ========= Internal Service Auth =========
# Must match the INTERNAL_API_KEY env-var on the cart/product servicce
internal.api.key=${INTERNAL_API_KEY:internal-api}

# ========= phone pe gateway =======
# Checkout page URL prefix — append ?token={token} to build the payment URL
phonepe.checkout.base.url=https://mercury.phonepe.com/transact/v3
phonepe.clientId=${PHONEPE_CLIENT_ID}
phonepe.clientSecret=${PHONEPE.CLIENT_SECRET}
phonepe.clientVersion=${PHONEPE.CLIENT_VERSION}
payment.webhook.secret={PHONE_PAY_WEBHOOK_SECRET}
// uhu8oif iuu8f iu89ui jui nkuui uhiui jiji

# ─── Add these to your existing application.properties / application.yml ──────
 
# ── FCM (Firebase Cloud Messaging) ────────────────────────────────────────────
# Set to true only when firebase-service-account.json is present
fcm.enabled=false
fcm.service-account-file=classpath:firebase-service-account.json
 
# ── Kafka: notification events topic ──────────────────────────────────────────
# This topic is consumed by NotificationEventListener (cross-service events)
# Other microservices publish to this topic to trigger notifications
notification.events.topic=notification.events
 
# ── Notification dedup cache TTL (Redis) ──────────────────────────────────────
# Idempotency window for Kafka notification events (in hours)
notification.dedup.ttl.hours=24
 
# ── Async executor for NotificationDispatcher ─────────────────────────────────
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=notif-async-
 
# ── Flyway (if you use Flyway for DB migrations) ──────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
